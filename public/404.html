<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <!-- bootstrap 4.3.1 -->
  <link rel="stylesheet" href="css/vendor/bootstrap.min.css">
  <!-- styles -->
  <link rel="stylesheet" href="css/styles.min.css">
  <link rel="stylesheet" href="css/custom.css">
  <!-- favicon -->
  <link rel="icon" href="img/favicon.ico">
  <title>Adopte un Artiste | Page introuvable</title>
</head>
<body>

  <!-- ERROR SECTION -->
  <div class="error-section">
    <!-- ERROR SECTION TITLE -->
    <p class="error-section-title">404</p>
    <!-- /ERROR SECTION TITLE -->

    <!-- ERROR SECTION INFO -->
    <div class="error-section-info">
      <!-- ERROR SECTION SUBTITLE -->
      <p class="error-section-subtitle">Oups !</p>
      <!-- /ERROR SECTION SUBTITLE -->

      <!-- ERROR SECTION TEXT -->
      <p class="error-section-text">Cette page n'existe pas ou a ete deplacee. Pas de panique, vous pouvez revenir en arriere !</p>
      <!-- /ERROR SECTION TEXT -->

      <!-- ERROR SECTION TEXT -->
      <p class="error-section-text">Redirection automatique dans <span id="countdown">5</span> secondes...</p>
      <!-- /ERROR SECTION TEXT -->

      <!-- BUTTON -->
      <a class="button medium primary" href="newsfeed.html">Retour a l'accueil</a>
      <!-- /BUTTON -->
    </div>
    <!-- /ERROR SECTION INFO -->
  </div>
  <!-- /ERROR SECTION -->

<script>
(function() {
  var count = 5;
  var el = document.getElementById('countdown');
  var timer = setInterval(function() {
    count--;
    if (el) el.textContent = count;
    if (count <= 0) {
      clearInterval(timer);
      window.location.href = 'newsfeed.html';
    }
  }, 1000);
})();
</script>
</body>
</html>
